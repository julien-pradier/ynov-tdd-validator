name: Build and Test React Application

on:
  push:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    env:
      CI: true
      REACT_APP_API_TOKEN: ${{ secrets.JSONPLACEHOLDER_TOKEN }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 21.x

      - name: npm ci, build and test
        run: |
          npm ci
          npm run docs
          npm run build --if-present
          npm test

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          start: npm start

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  publish-npm:
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 21.x
          registry-url: 'https://registry.npmjs.org'

      - name: Installer les dépendances
        run: npm ci

      - name: Build package
        run: npm run build-npm

      - name: Logique de Bypass et Publication NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install -g semver

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")

          echo "Package      : $PACKAGE_NAME"
          echo "Version locale : $LOCAL_VERSION"
          echo "Version NPM    : $NPM_VERSION"

          # ✅ Fix principal : syntaxe corrigée avec -r ">version"
          # semver retourne la version si elle satisfait le range, sinon chaîne vide
          IS_NEWER=$(semver "$LOCAL_VERSION" -r ">$NPM_VERSION" || echo "")
          echo "Résultat comparaison (IS_NEWER) : '$IS_NEWER'"

          if [ -n "$IS_NEWER" ]; then
            echo "Version locale ($LOCAL_VERSION) > NPM ($NPM_VERSION). Publication..."
            npm publish
          else
            echo "Pas de nouvelle version ($LOCAL_VERSION <= $NPM_VERSION). Publication skippée."
          fi

  deploy:
    needs: publish-npm
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4