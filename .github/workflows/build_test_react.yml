name: Build and Test React Application

on:
  push:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [21.x]
    
    env:
      REACT_APP_API_TOKEN: ${{ secrets.JSONPLACEHOLDER_TOKEN }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node_version }}

      - name: npm ci, build and test
        run: |
          npm ci
          npm run docs
          npm run build --if-present
          npm test

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          build: npm run build
          start: npm start

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  publish-npm:
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 21.x
          registry-url: 'https://registry.npmjs.org'

      - name: Installer les dépendances
        run: npm ci

      - name: Build package
        run: npm run build-npm

      - name: Logique de Bypass et Publication NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # 1. Récupération des informations du package.json
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          
          # Récupération de la version en ligne sur NPM (ou 0.0.0 si le package n'existe pas encore)
          NPM_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")
          
          echo "Package : $PACKAGE_NAME"
          echo "Version locale : $LOCAL_VERSION"
          echo "Version NPM : $NPM_VERSION"
          
          # 2. Comparaison stricte des versions (Bypass)
          if [ "$(npx semver $LOCAL_VERSION -g $NPM_VERSION)" = "$LOCAL_VERSION" ]; then
            echo "La version locale ($LOCAL_VERSION) est strictement supérieure à la version NPM ($NPM_VERSION). Publication en cours..."
            npm publish
          else
            echo "Aucune nouvelle version détectée. L'étape de publication est skippée."
          fi

  deploy:
    needs: publish-npm
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4